<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title>
<style>body{font-family:sans-serif;padding:20px;background:#111;color:#eee;}
button{margin:8px;padding:10px 18px;background:#ffe44d;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:14px;}
canvas{display:block;margin:12px 0;border:1px solid #444;}</style>
</head>
<body>
<h2>Big Bad Wolf – Icon Generator</h2>
<p>Click each button to download the PNG icon, then place them next to bigbadwolf.html.</p>
<canvas id="c192" width="192" height="192"></canvas>
<button onclick="save('c192','icon-192.png')">Download icon-192.png</button>
<canvas id="c512" width="512" height="512"></canvas>
<button onclick="save('c512','icon-512.png')">Download icon-512.png</button>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const sc = s / 512;

  // Background
  ctx.fillStyle = '#000418';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, 80 * sc);
  ctx.fill();

  // Background stars
  [[72,90,3.5,.55],[190,52,2.5,.45],[420,75,3,.6],[460,200,2,.5],
   [90,320,2.5,.55],[370,420,3,.45],[310,130,2,.4],[150,400,2,.5]].forEach(([x,y,r,a])=>{
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(x*sc,y*sc,r*sc,0,Math.PI*2); ctx.fill();
  });

  // Planet
  ctx.globalAlpha=.35;
  ctx.fillStyle='#c07855';
  ctx.beginPath(); ctx.ellipse(400*sc,110*sc,38*sc,38*sc,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=.3;
  ctx.save(); ctx.scale(1.9,.38);
  ctx.strokeStyle='#c07855'; ctx.lineWidth=7*sc;
  ctx.beginPath(); ctx.arc(400*sc/1.9,110*sc/.38,56*sc,0,Math.PI*2); ctx.stroke();
  ctx.restore();
  ctx.globalAlpha=1;

  // 5-pointed star
  ctx.fillStyle='#ffe44d';
  ctx.beginPath();
  const pts=[[256,68],[284,168],[388,168],[306,228],[334,328],[256,268],[178,328],[206,228],[124,168],[228,168]];
  pts.forEach(([x,y],i)=> i===0 ? ctx.moveTo(x*sc,y*sc) : ctx.lineTo(x*sc,y*sc));
  ctx.closePath(); ctx.fill();

  // Star inner highlight
  ctx.fillStyle='rgba(255,245,160,.55)';
  ctx.beginPath();
  [[256,104],[276,164],[340,164],[290,200],[310,260],[256,224],[202,260],[222,200],[172,164],[236,164]]
    .forEach(([x,y],i)=> i===0 ? ctx.moveTo(x*sc,y*sc) : ctx.lineTo(x*sc,y*sc));
  ctx.closePath(); ctx.fill();

  // Wolf (simplified)
  ctx.save(); ctx.translate(256*sc, 370*sc); ctx.scale(0.7*sc, 0.7*sc);
  ctx.fillStyle='#888898';
  ctx.beginPath(); ctx.ellipse(0,15,38,30,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-28,28,26,0,0,Math.PI*2); ctx.fill();
  // ears
  [[[-20,-48,-32,-72,-6,-52],[20,-48,32,-72,6,-52]]].flat().forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill();
  });
  // eyes
  ctx.fillStyle='#ffee00';
  ctx.beginPath(); ctx.ellipse(-10,-32,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-32,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(-10,-32,3,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-32,3,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#aaaabe';
  ctx.beginPath(); ctx.ellipse(0,-16,16,11,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(0,-20,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

['c192','c512'].forEach(id => drawIcon(document.getElementById(id)));

function save(id, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = document.getElementById(id).toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
