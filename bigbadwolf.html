<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Big Bad Wolf!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas { display: block; transform-origin: top center; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ================================================================
//  BIG BAD WOLF  –  save the stars from the Big Bad Wolf!
// ================================================================
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 900;
const H = canvas.height = 560;

function resizeCanvas() {
  const scale = Math.min(1, window.innerWidth / W, window.innerHeight / H);
  if (scale < 1) {
    canvas.style.transform = `scale(${scale})`;
    canvas.style.marginTop = `${(window.innerHeight - H * scale) / 2}px`;
  } else {
    canvas.style.transform = '';
    canvas.style.marginTop = '';
  }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Audio ─────────────────────────────────────────────────────────
let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function beep(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  if (type === 'baseball') {
    o.type = 'square';
    o.frequency.setValueAtTime(280, t);
    o.frequency.exponentialRampToValueAtTime(120, t + .1);
    g.gain.setValueAtTime(.14, t); g.gain.exponentialRampToValueAtTime(.001, t + .13);
    o.start(t); o.stop(t + .15);
  } else if (type === 'laser') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(900, t);
    o.frequency.exponentialRampToValueAtTime(180, t + .07);
    g.gain.setValueAtTime(.08, t); g.gain.exponentialRampToValueAtTime(.001, t + .09);
    o.start(t); o.stop(t + .1);
  } else if (type === 'lava') {
    o.type = 'sine';
    o.frequency.setValueAtTime(55, t);
    o.frequency.linearRampToValueAtTime(130, t + .12);
    o.frequency.linearRampToValueAtTime(50, t + .25);
    g.gain.setValueAtTime(.3, t); g.gain.exponentialRampToValueAtTime(.001, t + .28);
    o.start(t); o.stop(t + .3);
  } else if (type === 'lightning') {
    // crack + rumble
    o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(60,t+.06);
    g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.start(t); o.stop(t+.12);
    const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.type='sawtooth'; o2.frequency.setValueAtTime(500,t+.03); o2.frequency.exponentialRampToValueAtTime(80,t+.22);
    g2.gain.setValueAtTime(0,t+.03); g2.gain.linearRampToValueAtTime(.18,t+.06); g2.gain.exponentialRampToValueAtTime(.001,t+.28);
    o2.start(t+.03); o2.stop(t+.3);
  } else if (type === 'boomerang') {
    o.type='triangle';
    o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(900,t+.05);
    o.frequency.exponentialRampToValueAtTime(380,t+.14);
    g.gain.setValueAtTime(.13,t); g.gain.exponentialRampToValueAtTime(.001,t+.2);
    o.start(t); o.stop(t+.22);
  } else if (type === 'icecream') {
    o.type='sine';
    o.frequency.setValueAtTime(880,t); o.frequency.linearRampToValueAtTime(1100,t+.04);
    o.frequency.linearRampToValueAtTime(660,t+.1);
    g.gain.setValueAtTime(.09,t); g.gain.exponentialRampToValueAtTime(.001,t+.16);
    o.start(t); o.stop(t+.18);
  } else if (type === 'flower') {
    o.type='triangle';
    o.frequency.setValueAtTime(600,t); o.frequency.exponentialRampToValueAtTime(300,t+.08);
    g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.12);
    o.start(t); o.stop(t+.14);
  } else if (type === 'grenadePlace') {
    o.type='sine';
    o.frequency.setValueAtTime(350,t); o.frequency.linearRampToValueAtTime(1100,t+.1);
    o.frequency.linearRampToValueAtTime(280,t+.32);
    g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.38);
    o.start(t); o.stop(t+.42);
  } else if (type === 'nuke') {
    o.type='sawtooth';
    o.frequency.setValueAtTime(80,t); o.frequency.linearRampToValueAtTime(500,t+.07);
    o.frequency.exponentialRampToValueAtTime(30,t+.55);
    g.gain.setValueAtTime(.38,t); g.gain.exponentialRampToValueAtTime(.001,t+.62);
    o.start(t); o.stop(t+.65);
    const o2=audioCtx.createOscillator(), g2=audioCtx.createGain();
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.type='square'; o2.frequency.setValueAtTime(900,t); o2.frequency.exponentialRampToValueAtTime(120,t+.35);
    g2.gain.setValueAtTime(.22,t); g2.gain.exponentialRampToValueAtTime(.001,t+.45);
    o2.start(t); o2.stop(t+.5);
  } else if (type === 'rainbow') {
    o.type='sine';
    o.frequency.setValueAtTime(700,t); o.frequency.linearRampToValueAtTime(1100,t+.04);
    o.frequency.linearRampToValueAtTime(500,t+.1);
    g.gain.setValueAtTime(.09,t); g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.start(t); o.stop(t+.18);
  } else if (type === 'bubble') {
    o.type='sine';
    o.frequency.setValueAtTime(340,t); o.frequency.exponentialRampToValueAtTime(560,t+.07);
    g.gain.setValueAtTime(.07,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.start(t); o.stop(t+.12);
  } else if (type === 'boom') {
    o.type = 'triangle';
    o.frequency.setValueAtTime(380, t);
    o.frequency.setValueAtTime(550, t + .05);
    o.frequency.setValueAtTime(220, t + .1);
    g.gain.setValueAtTime(.22, t); g.gain.exponentialRampToValueAtTime(.001, t + .28);
    o.start(t); o.stop(t + .3);
  } else if (type === 'ouch') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(70, t + .3);
    g.gain.setValueAtTime(.28, t); g.gain.exponentialRampToValueAtTime(.001, t + .35);
    o.start(t); o.stop(t + .4);
  } else if (type === 'start') {
    [261,329,392,523].forEach((hz, i) => {
      const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
      o2.connect(g2); g2.connect(audioCtx.destination);
      o2.type = 'square'; o2.frequency.value = hz;
      const s = t + i*.1;
      g2.gain.setValueAtTime(0,s); g2.gain.linearRampToValueAtTime(.12, s+.04);
      g2.gain.exponentialRampToValueAtTime(.001, s+.18);
      o2.start(s); o2.stop(s+.22);
    });
  }
}

// ── Stars & Planets ───────────────────────────────────────────────
const STARS = Array.from({length:130}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*2+.4, speed: Math.random()*1.4+.2,
  tw: Math.random()*Math.PI*2
}));
const PLANETS = [
  { x:680, y:90,  r:44, col:'#c07855', ring:true  },
  { x:180, y:430, r:22, col:'#5599cc', ring:false },
  { x:800, y:320, r:16, col:'#88cc66', ring:false },
];

// ── IndexedDB High Scores ─────────────────────────────────────────
let db=null, topScores=[];
function initDB() {
  const req=indexedDB.open('BigBadWolf',1);
  req.onupgradeneeded=e=>{
    const d=e.target.result;
    if (!d.objectStoreNames.contains('scores'))
      d.createObjectStore('scores',{keyPath:'id',autoIncrement:true})
       .createIndex('score','score',{unique:false});
  };
  req.onsuccess=e=>{ db=e.target.result; loadTopScores(); };
  req.onerror=()=>{};
}
function saveScore(s) {
  if (!db||s<=0) return;
  const tx=db.transaction('scores','readwrite');
  tx.objectStore('scores').add({score:s,date:Date.now()});
  tx.oncomplete=()=>loadTopScores();
}
function loadTopScores() {
  if (!db) return;
  const tx=db.transaction('scores','readonly');
  const req=tx.objectStore('scores').index('score').getAll();
  req.onsuccess=e=>{ topScores=e.target.result.sort((a,b)=>b.score-a.score).slice(0,10); };
}
initDB();

// ── Game State ────────────────────────────────────────────────────
let gstate = 'charselect';  // charselect | playing | gameover
let selectedChar = 'boy';   // boy | girl
let score=0, hiScore=0, lives=5, frame=0;
let weapon = 'baseball';  // baseball | laser | lava | sword | boomerang | rainbow | bubble | icecream | flower
let rainbowHue = 0, flowerIdx = 0;
let shootCD = 0, spawnTimer = 0, diff = 1, diffTimer = 0;
let powerupTimer = 400, grenadePickupTimer = 600;
let grenadeCount = 0;
let chargeKills=0, chargeActive=false, chargeTimer=0;
const chargeMax=30, chargeActiveTime=420;
let paused = false;

const player = { x:110, y:H/2, speed:4.8, invincible:0, hitFlash:0 };

let projectiles=[], enemies=[], particles=[], floats=[], lightnings=[], powerups=[], rainbowZones=[];
let swordAngle=-0.8, swordSwinging=0;

// ── Input ─────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  const fresh = !keys[e.code];
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.code)) e.preventDefault();
  // Pause toggle / controls during pause
  if (e.code==='KeyP' && gstate==='playing') { paused=!paused; return; }
  if (paused) {
    if (e.code==='Space'||e.code==='Enter'||e.code==='Escape') { paused=false; return; }
    if (e.code==='KeyQ') { paused=false; gstate='charselect'; return; }
    return;
  }
  if (gstate==='charselect') {
    if (e.code==='ArrowLeft'  || e.code==='KeyA') selectedChar='boy';
    if (e.code==='ArrowRight' || e.code==='KeyD') selectedChar='girl';
    if (fresh && e.code==='KeyH') { gstate='hiscores'; return; }
  }
  if (gstate==='gameover' && fresh && e.code==='KeyH') { gstate='hiscores'; return; }
  if (gstate==='hiscores' && fresh && (e.code==='Space'||e.code==='Enter'||e.code==='Escape'||e.code==='KeyH')) { gstate='charselect'; return; }
  if (gstate==='playing') {
    if (e.code==='Digit1') switchWeapon(selectedChar==='girl'?'rainbow':'baseball');
    if (e.code==='Digit2') switchWeapon(selectedChar==='girl'?'bubble':'laser');
    if (e.code==='Digit3') switchWeapon(selectedChar==='girl'?'icecream':'lava');
    if (e.code==='Digit4') switchWeapon(selectedChar==='girl'?'flower':'sword');
    if (e.code==='Digit5' && selectedChar==='boy') switchWeapon('boomerang');
    if (e.code==='Tab') { cycleWeapon(); }
    if (e.code==='KeyG' && grenadeCount>0) deployGrenade();
  }
  if (fresh && (e.code==='Space'||e.code==='Enter')) {
    initAudio();
    if (gstate==='charselect') startGame();
    else if (gstate==='gameover') gstate='charselect';
  }
});
document.addEventListener('keyup', e => { keys[e.code]=false; });

// Touch controls
let touchPos = null;  // {x,y} in canvas coords — null when not touching
let touchControls = false;
const WPN_BTN    = { x: W-58,  y: H-52, r: 44 };
const GREN_BTN   = { x: W-168, y: H-52, r: 36 };
const PAUSE_BTN  = { x: W-28,  y: 28,   r: 24 };
const HISCORE_BTN= { x: W-42,  y: H-28, r: 30 };

function touchToCanvas(t) {
  const r=canvas.getBoundingClientRect();
  return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) };
}
function onWpnBtn(cx, cy)  { return Math.hypot(cx-WPN_BTN.x,  cy-WPN_BTN.y)  < WPN_BTN.r+10; }
function onGrenBtn(cx, cy) { return grenadeCount>0 && Math.hypot(cx-GREN_BTN.x, cy-GREN_BTN.y) < GREN_BTN.r+10; }
function onPauseBtn(cx,cy) { return Math.hypot(cx-PAUSE_BTN.x, cy-PAUSE_BTN.y) < PAUSE_BTN.r+12; }
function onHiBtn(cx, cy)   { return Math.hypot(cx-HISCORE_BTN.x,cy-HISCORE_BTN.y)< HISCORE_BTN.r+10; }
function cycleWeapon() {
  const list=selectedChar==='girl'?['rainbow','bubble','icecream','flower']:['baseball','laser','lava','sword','boomerang'];
  switchWeapon(list[(list.indexOf(weapon)+1)%list.length]);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault(); touchControls=true; initAudio();
  const first=touchToCanvas(e.changedTouches[0]);
  if (gstate==='charselect') {
    if (onHiBtn(first.x,first.y)) { gstate='hiscores'; return; }
    if (first.y>505) startGame();
    else selectedChar=first.x<W/2?'boy':'girl';
    return;
  }
  if (gstate==='gameover') {
    if (onHiBtn(first.x,first.y)) { gstate='hiscores'; return; }
    gstate='charselect'; return;
  }
  if (gstate==='hiscores') { gstate='charselect'; return; }
  if (paused) {
    // pause overlay buttons: resume (left half) or quit (right half)
    if (first.x < W/2) paused=false;
    else { paused=false; gstate='charselect'; }
    return;
  }
  Array.from(e.changedTouches).forEach(t => {
    const p=touchToCanvas(t);
    if (onPauseBtn(p.x,p.y)) { paused=!paused; return; }
    if (onGrenBtn(p.x,p.y)) { deployGrenade(); return; }
    if (onWpnBtn(p.x,p.y)) cycleWeapon();
    else touchPos=p;
  });
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (gstate!=='playing') return;
  Array.from(e.changedTouches).forEach(t => {
    const p=touchToCanvas(t);
    if (!onWpnBtn(p.x,p.y)) touchPos=p;
  });
}, {passive:false});

canvas.addEventListener('touchend', e => {
  if (e.touches.length===0) touchPos=null;
  else if (Array.from(e.touches).every(t=>{ const p=touchToCanvas(t); return onWpnBtn(p.x,p.y); })) touchPos=null;
});
canvas.addEventListener('touchcancel', () => { touchPos=null; });

canvas.addEventListener('mousedown', e => {
  if (!paused) return;
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(W/r.width);
  // Resume button (left), Quit button (right)
  if (cx < W/2) paused=false;
  else { paused=false; gstate='charselect'; }
});

function switchWeapon(w) {
  weapon = w;
  const labels = {baseball:'⚾ Baseball!', laser:'🔴 Laser!', lava:'🌋 Lava Spray!', sword:'⚡ Lightning Sword!', boomerang:'🪃 Boomerang!', rainbow:'🌈 Rainbow Blast!', bubble:'🫧 Bubbles!', icecream:'🍦 Ice Cream!', flower:'🌸 Flowers!'};
  spawnFloat(player.x+50, player.y-50, labels[w], '#ffe44d', 40);
}

// ── Start / Reset ─────────────────────────────────────────────────
function startGame() {
  score=0; lives=5; frame=0; diff=1; diffTimer=0;
  weapon=selectedChar==='girl'?'rainbow':'baseball'; rainbowHue=0; flowerIdx=0; shootCD=0; spawnTimer=0; powerupTimer=400; grenadePickupTimer=600;
  grenadeCount=0; chargeKills=0; chargeActive=false; chargeTimer=0; paused=false;
  player.x=110; player.y=H/2; player.invincible=0; player.hitFlash=0;
  projectiles=[]; enemies=[]; particles=[]; floats=[]; lightnings=[]; powerups=[]; rainbowZones=[];
  swordAngle=-0.8; swordSwinging=0;
  gstate='playing';
  beep('start');
}

// ── Shoot ─────────────────────────────────────────────────────────
function shoot() {
  if (gstate!=='playing' || shootCD>0) return;
  const cx = player.x+38, cy = player.y-5;
  if (weapon==='baseball') {
    projectiles.push({type:'baseball', x:cx, y:cy, vx:12, vy:0, r:13, spin:0});
    shootCD=18; beep('baseball');
  } else if (weapon==='laser') {
    [-9,9].forEach(dy => projectiles.push({type:'laser', x:cx, y:cy+dy, vx:20, vy:0, w:40, h:5}));
    shootCD=7; beep('laser');
  } else if (weapon==='lava') {
    [-1,0,1].forEach(i => projectiles.push({
      type:'lava', x:cx, y:cy+i*8,
      vx:8+Math.random()*2, vy:i*1.4,
      r:11+Math.random()*4, life:60, maxLife:60
    }));
    shootCD=15; beep('lava');
  } else if (weapon==='sword') {
    // sword: lightning strikes nearest enemy from sky
    const target = enemies.length
      ? enemies.reduce((b,e) => Math.abs(e.x-player.x)<Math.abs(b.x-player.x)?e:b)
      : null;
    const tx = target ? target.x : player.x+180+Math.random()*180;
    const ty = target ? target.y : H/2+(Math.random()-.5)*160;
    lightnings.push({x:tx, y:ty, segs:generateLightningPath(tx,ty), life:28, maxLife:28});
    if (target) {
      target.hp--; target.hitFlash=12;
      if (target.hp<=0) {
        const cols=target.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
        burst(target.x,target.y,cols[0],cols[1],target.type==='bigbad'?26:14);
        burst(target.x,target.y,cols[2],cols[3],7);
        const pts=target.type==='bigbad'?30:10;
        score+=pts; if(score>hiScore) hiScore=score;
        spawnFloat(target.x,target.y-45,`+${pts}`,'#ffe44d',45);
        beep('boom'); addChargeKill();
        enemies=enemies.filter(e=>e!==target);
      }
    }
    swordSwinging=22; shootCD=32; beep('lightning');
  } else if (weapon==='boomerang') {
    projectiles.push({type:'boomerang', x:cx, y:cy, vx:11, vy:0, r:16, angle:0, returning:false, hitSet:[]});
    shootCD=50; beep('boomerang');
  } else if (weapon==='icecream') {
    projectiles.push({type:'icecream', x:cx, y:cy, vx:9, vy:-1.2, r:15, spin:0});
    shootCD=22; beep('icecream');
  } else if (weapon==='flower') {
    const ft=flowerIdx; flowerIdx=(flowerIdx+1)%5;
    projectiles.push({type:'flower', x:cx, y:cy, vx:10.5, vy:0, r:13, spin:0, ft});
    shootCD=13; beep('flower');
  } else if (weapon==='rainbow') {
    rainbowHue=(rainbowHue+55)%360;
    projectiles.push({type:'rainbow', x:cx, y:cy, vx:13, vy:0, r:13, hue:rainbowHue});
    shootCD=13; beep('rainbow');
  } else {
    // bubble
    projectiles.push({type:'bubble', x:cx, y:cy, vx:4.5, vy:0, r:21, wobble:Math.random()*Math.PI*2});
    shootCD=22; beep('bubble');
  }
}

// ── Grenade Deploy ────────────────────────────────────────────────
function deployGrenade() {
  if (grenadeCount<=0) return;
  rainbowZones.push({x:player.x+110, y:player.y, r:90, vx:1.6});
  grenadeCount--;
  beep('grenadePlace');
  spawnFloat(player.x+110, player.y-55, '🌈 Rainbow Zone!', '#ff88ff', 55);
}

// ── Charge Kill Tracker ───────────────────────────────────────────
function addChargeKill(n=1) {
  chargeKills+=n;
  if (chargeKills>=chargeMax && !chargeActive) {
    chargeActive=true; chargeTimer=chargeActiveTime; chargeKills=0;
    beep('start');
    spawnFloat(player.x, player.y-85, '⚡ POWERED UP!', '#ff44ff', 100);
  }
}

// ── Beam Distance Helper ──────────────────────────────────────────
function distToBeam(ex,ey,px,py,angle,length) {
  const cos=Math.cos(angle), sin=Math.sin(angle);
  const t=Math.max(0,Math.min(length,(ex-px)*cos+(ey-py)*sin));
  return Math.hypot(ex-px-cos*t, ey-py-sin*t);
}
function beamLengthToEdge(px,py,angle) {
  const cos=Math.cos(angle), sin=Math.sin(angle);
  let t=Infinity;
  if (cos> 1e-4) t=Math.min(t,(W-px)/cos);
  else if (cos<-1e-4) t=Math.min(t,-px/cos);
  if (sin> 1e-4) t=Math.min(t,(H-py)/sin);
  else if (sin<-1e-4) t=Math.min(t,-py/sin);
  return t;
}

// ── Bubble Split Helper ───────────────────────────────────────────
function makeSplitBubbles(parent, bvx, bvy) {
  const baseA=Math.atan2(bvy,bvx);
  const spd=Math.max(3.5, Math.sqrt(bvx*bvx+bvy*bvy)*.82);
  return [-30,0,30].map(deg=>({
    type:'bubble', x:parent.x, y:parent.y,
    vx:Math.cos(baseA+deg*Math.PI/180)*spd,
    vy:Math.sin(baseA+deg*Math.PI/180)*spd,
    r:11, wobble:Math.random()*Math.PI*2, isChild:true
  }));
}

// ── Spawn Enemy ───────────────────────────────────────────────────
function spawnEnemy() {
  let pool = ['grunt','grunt','grunt','dancer'];
  if (diff>=2) pool.push('dancer','bigbad');
  if (diff>=3) pool.push('bigbad','bigbad');
  const type = pool[Math.floor(Math.random()*pool.length)];
  const y = 70 + Math.random()*(H-140);
  const e = { type, x:W+80, y, hitFlash:0, phase:Math.random()*Math.PI*2 };
  if (type==='grunt') {
    Object.assign(e, {hp:1, maxHp:1, vx:-(1.4+Math.random()*.4+diff*.18)});
  } else if (type==='dancer') {
    Object.assign(e, {hp:1, maxHp:1, vx:-(1.7+Math.random()*.4+diff*.18), amp:1.8+Math.random()*1.4});
  } else {
    Object.assign(e, {hp:3, maxHp:3, vx:-(1.0+diff*.12)});
  }
  enemies.push(e);
}

// ── Particles ─────────────────────────────────────────────────────
function burst(x, y, c1, c2, n) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    particles.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      r:3+Math.random()*6, life:40+Math.random()*20, maxLife:60,
      color:Math.random()>.5?c1:c2, star:Math.random()>.4});
  }
}
function spawnFloat(x, y, txt, col, life) {
  floats.push({x, y, txt, col, life, maxLife:life});
}

// ── Draw Helpers ──────────────────────────────────────────────────
function drawStar5(x, y, ro, ri) {
  ctx.beginPath();
  for (let i=0;i<10;i++) {
    const a = (i*Math.PI/5) - Math.PI/2;
    const r = i%2===0 ? ro : ri;
    i===0 ? ctx.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r)
           : ctx.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
}

function wheel(wx, wy, r) {
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(wx,wy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#777'; ctx.beginPath(); ctx.arc(wx,wy,r*.65,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#bbb'; ctx.beginPath(); ctx.arc(wx,wy,r*.28,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#999'; ctx.lineWidth=1.5;
  for (let i=0;i<4;i++) {
    const a = frame*.06+i*Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(wx+Math.cos(a)*r*.28, wy+Math.sin(a)*r*.28);
    ctx.lineTo(wx+Math.cos(a)*r*.65, wy+Math.sin(a)*r*.65);
    ctx.stroke();
  }
}

// ── Draw Background ───────────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,W,0);
  g.addColorStop(0,'#040418'); g.addColorStop(1,'#000408');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  PLANETS.forEach(p => {
    ctx.save(); ctx.translate(p.x, p.y);
    if (p.ring) {
      ctx.save(); ctx.scale(1.9,.38);
      ctx.strokeStyle='rgba(160,100,70,.45)'; ctx.lineWidth=8;
      ctx.beginPath(); ctx.arc(0,0,p.r*1.5,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha=.28; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.restore();
  });

  STARS.forEach(s => {
    const a = .45+.45*Math.sin(frame*.025+s.tw);
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });
}

// ── Lightning Path & Draw ─────────────────────────────────────────
function generateLightningPath(tx, ty) {
  const segs=[{x:tx+(Math.random()-.5)*40, y:0}];
  const steps=Math.max(5, Math.floor(ty/40));
  for (let i=1;i<=steps;i++) {
    const prog=i/steps;
    const spread=55*(1-prog*.5);
    segs.push({x:tx+(Math.random()-.5)*spread, y:ty*prog});
  }
  segs.push({x:tx, y:ty});
  // one branch off a middle segment
  const bi=Math.floor(segs.length/2);
  const bsrc=segs[bi];
  segs._branch=[
    {x:bsrc.x, y:bsrc.y},
    {x:bsrc.x+(Math.random()-.5)*40, y:bsrc.y+ty*.15},
    {x:bsrc.x+(Math.random()-.3)*50, y:bsrc.y+ty*.28},
  ];
  return segs;
}

function drawLightnings() {
  lightnings.forEach(bolt=>{
    const a=bolt.life/bolt.maxLife;
    ctx.save(); ctx.globalAlpha=a;

    function strokeSegs(segs, lw, col, blur, sc) {
      ctx.shadowColor=sc||col; ctx.shadowBlur=blur;
      ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath();
      segs.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
      ctx.stroke();
    }
    // outer glow
    strokeSegs(bolt.segs, 6, 'rgba(100,180,255,.4)', 22, '#88ccff');
    // mid
    strokeSegs(bolt.segs, 3, '#aaddff', 10, '#ffffff');
    // bright core
    strokeSegs(bolt.segs, 1.5, '#ffffff', 4, '#ffffff');
    // branch
    if (bolt.segs._branch) {
      ctx.globalAlpha=a*.6;
      strokeSegs(bolt.segs._branch, 2, '#aaddff', 8, '#88ccff');
      strokeSegs(bolt.segs._branch, 1, '#ffffff', 2, '#ffffff');
    }
    // impact flash at target
    if (a>.5) {
      ctx.globalAlpha=a*(a-.5)*2;
      ctx.fillStyle='#cceeff';
      ctx.shadowColor='#aaddff'; ctx.shadowBlur=30;
      ctx.beginPath(); ctx.arc(bolt.x, bolt.y, 18*(a), 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    ctx.restore();
  });
}

// ── Draw Wolf ─────────────────────────────────────────────────────
function drawWolf(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  if (e.hitFlash>0) ctx.filter='brightness(4) saturate(0)';

  const sc = e.type==='bigbad' ? 1.42 : 1;
  ctx.scale(sc, sc);

  // shadow
  ctx.filter='none';
  ctx.fillStyle='rgba(0,0,0,.12)';
  ctx.beginPath(); ctx.ellipse(0,32,26,7,0,0,Math.PI*2); ctx.fill();
  if (e.hitFlash>0) ctx.filter='brightness(4) saturate(0)';

  const mc = e.type==='bigbad' ? '#55566a' : e.type==='dancer' ? '#8b6040' : '#888898';
  const dk = e.type==='bigbad' ? '#333348' : e.type==='dancer' ? '#6b4025' : '#666676';
  const lt = e.type==='bigbad' ? '#9898b0' : e.type==='dancer' ? '#b08862' : '#aaaabe';

  // body
  ctx.fillStyle=mc; ctx.beginPath(); ctx.ellipse(0,8,20,25,0,0,Math.PI*2); ctx.fill();
  // belly
  ctx.fillStyle=lt; ctx.beginPath(); ctx.ellipse(0,10,12,17,0,0,Math.PI*2); ctx.fill();

  // legs
  for (const side of [-1,1]) {
    ctx.save(); ctx.translate(side*9, 25);
    ctx.rotate(side * Math.sin(frame*.14+e.phase)*.25);
    ctx.fillStyle=mc; ctx.beginPath(); ctx.ellipse(0,8,6,11,side*.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=dk; ctx.beginPath(); ctx.ellipse(side*3,17,7,4,side*.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // arms
  for (const side of [-1,1]) {
    ctx.save(); ctx.translate(side*18, 0);
    ctx.rotate(side * Math.sin(frame*.1+e.phase) * .2);
    ctx.fillStyle=mc; ctx.beginPath(); ctx.ellipse(0,5,7,14,side*.25,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=dk;
    for (let ci=-1;ci<=1;ci++) {
      ctx.beginPath(); ctx.ellipse(ci*4,17,2.5,5,ci*.3,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // tail
  ctx.save(); ctx.translate(14,4);
  ctx.rotate(Math.sin(frame*.11+e.phase)*.4+.5);
  ctx.fillStyle=lt; ctx.beginPath(); ctx.ellipse(8,-5,6,18,.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e8e8e8'; ctx.beginPath(); ctx.ellipse(14,-15,7,8,.8,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // head
  ctx.fillStyle=mc; ctx.beginPath(); ctx.arc(0,-22,22,0,Math.PI*2); ctx.fill();

  // ears
  [[-14,-38,-24,-56,-4,-42],[14,-38,24,-56,4,-42]].forEach(([x1,y1,x2,y2,x3,y3]) => {
    ctx.fillStyle=mc; ctx.beginPath();
    ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff8080'; ctx.beginPath();
    ctx.moveTo(x1,y1-2); ctx.lineTo(x2*.88,y2*.95); ctx.lineTo(x3*.7,y3); ctx.closePath(); ctx.fill();
  });

  // snout
  ctx.fillStyle=lt; ctx.beginPath(); ctx.ellipse(-1,-15,14,10,0,0,Math.PI*2); ctx.fill();
  // nose
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.ellipse(-1,-19,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#555'; ctx.beginPath(); ctx.ellipse(-3,-20,2.5,1.5,-.3,0,Math.PI*2); ctx.fill();

  // eyes (yellow, menacing)
  ctx.fillStyle='#ffee00';
  ctx.beginPath(); ctx.ellipse(-11,-27,6,7,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 9,-27,6,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(-11,-27,2.5,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(  9,-27,2.5,6,0,0,Math.PI*2); ctx.fill();

  // angry brows
  ctx.strokeStyle=dk; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-17,-34); ctx.lineTo(-5,-31); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 15,-34); ctx.lineTo( 3,-31); ctx.stroke();

  // mouth + teeth
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-1,-10,10,.12,Math.PI-.12); ctx.fill();
  ctx.fillStyle='#fff';
  for (let ti=-2;ti<=2;ti++) {
    const tx=-1+ti*4;
    ctx.beginPath(); ctx.moveTo(tx-1,-10); ctx.lineTo(tx-3,-4); ctx.lineTo(tx+3,-4); ctx.closePath(); ctx.fill();
  }

  // big-bad hat (top hat = boss indicator)
  if (e.type==='bigbad') {
    ctx.fillStyle='#181818';
    ctx.beginPath(); ctx.ellipse(0,-44,18,5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-10,-65,20,23,2); ctx.fill();
    ctx.fillStyle='#cc0022'; ctx.fillRect(-10,-47,20,3);
  }

  // dancer: party hat
  if (e.type==='dancer') {
    ctx.fillStyle='#220055';
    ctx.beginPath(); ctx.ellipse(0,-43,15,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#6611bb';
    ctx.beginPath(); ctx.roundRect(-8,-59,16,17,2); ctx.fill();
    ctx.fillStyle='#ff22aa'; ctx.fillRect(-8,-46,16,3);
  }

  // HP bar (bigbad only)
  if (e.type==='bigbad') {
    const bw=52, bh=7, bx=-26, by=38;
    ctx.filter='none';
    ctx.fillStyle='#400'; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,3); ctx.fill();
    ctx.fillStyle='#f33'; ctx.beginPath(); ctx.roundRect(bx,by,bw*(e.hp/e.maxHp),bh,3); ctx.fill();
    if (e.hitFlash>0) ctx.filter='brightness(4) saturate(0)';
  }

  ctx.filter='none'; ctx.restore();
}

// ── Draw Flower Helper ────────────────────────────────────────────
function drawFlower(ft, r, spin) {
  const petalCols=['#ff2244','#ffdd00','#f8f8f0','#ff66cc','#9933ff'];
  const centerCols=['#ffdd00','#7b3f00','#ffdd22','#ffaa00','#ffee55'];
  const nPetals=[5,8,8,6,6];
  ctx.save(); ctx.rotate(spin);
  ctx.fillStyle=petalCols[ft];
  const n=nPetals[ft];
  for (let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2;
    ctx.save(); ctx.rotate(a);
    ctx.beginPath(); ctx.ellipse(0,-r*.72,r*.38,r*.68,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle=centerCols[ft];
  ctx.beginPath(); ctx.arc(0,0,r*.38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.beginPath(); ctx.arc(-r*.1,-r*.1,r*.14,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw Projectiles ──────────────────────────────────────────────
function drawProjectile(p) {
  ctx.save();
  if (p.type==='baseball') {
    ctx.translate(p.x, p.y); ctx.rotate(p.spin);
    // ball
    ctx.fillStyle='#fffdf5'; ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
    // seams
    ctx.strokeStyle='#cc2222'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-p.r*.5,-p.r*.65); ctx.quadraticCurveTo(-p.r*.85,0,-p.r*.5,p.r*.65); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( p.r*.5,-p.r*.65); ctx.quadraticCurveTo( p.r*.85,0, p.r*.5,p.r*.65); ctx.stroke();
    for (let i=-2;i<=2;i++) {
      const yy=i*p.r*.22;
      ctx.beginPath();
      ctx.moveTo(-p.r*.62,yy-p.r*.07); ctx.lineTo(-p.r*.42,yy+p.r*.07);
      ctx.moveTo( p.r*.42,yy-p.r*.07); ctx.lineTo( p.r*.62,yy+p.r*.07);
      ctx.stroke();
    }
    ctx.strokeStyle='rgba(200,200,200,.4)'; ctx.lineWidth=.8;
    ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.stroke();
  } else if (p.type==='laser') {
    ctx.shadowColor='#00ffbb'; ctx.shadowBlur=14;
    ctx.fillStyle='#00ffcc';
    ctx.beginPath(); ctx.roundRect(p.x,p.y-p.h/2,p.w,p.h,p.h/2); ctx.fill();
    ctx.shadowColor='#fff'; ctx.shadowBlur=4;
    ctx.fillStyle='#ccffee';
    ctx.beginPath(); ctx.roundRect(p.x,p.y-p.h/2+1,p.w,p.h-2,(p.h-2)/2); ctx.fill();
    ctx.shadowBlur=0;
  } else if (p.type==='lava') {
    const fade=p.life/p.maxLife;
    ctx.globalAlpha=0.4+fade*.6;
    ctx.shadowColor='#ff4400'; ctx.shadowBlur=18;
    ctx.fillStyle='#cc2200'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.shadowColor='#ff8800'; ctx.shadowBlur=10;
    ctx.fillStyle='#ff5500'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*.7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(p.x-p.r*.2,p.y-p.r*.2,p.r*.35,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  } else if (p.type==='icecream') {
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.spin);
    // clip to scoop oval
    ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*.92,0,0,Math.PI*2); ctx.clip();
    // neapolitan thirds: chocolate, vanilla, strawberry
    ctx.fillStyle='#7b3f00'; ctx.fillRect(-p.r,-p.r,p.r*.67,p.r*2);
    ctx.fillStyle='#fff8e8'; ctx.fillRect(-p.r+p.r*.67,-p.r,p.r*.67,p.r*2);
    ctx.fillStyle='#ffb3c6'; ctx.fillRect(-p.r+p.r*1.34,-p.r,p.r*.67,p.r*2);
    ctx.restore();
    // outline
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.strokeStyle='rgba(160,100,70,.55)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(0,0,p.r,p.r*.92,p.spin,0,Math.PI*2); ctx.stroke();
    // sparkle
    ctx.fillStyle='rgba(255,255,255,.75)';
    ctx.beginPath(); ctx.ellipse(-p.r*.25,-p.r*.3,p.r*.22,p.r*.13,p.spin-.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else if (p.type==='flower') {
    const glowCols=['#ff4466','#ffee00','#fff','#ff88dd','#cc66ff'];
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor=glowCols[p.ft]; ctx.shadowBlur=12;
    drawFlower(p.ft, p.r, p.spin);
    ctx.shadowBlur=0; ctx.restore();
  } else if (p.type==='boomerang') {
    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
    ctx.shadowColor='#ffcc44'; ctx.shadowBlur=16;
    // Arm 1: rightward
    ctx.save();
    ctx.fillStyle='#aa6600';
    ctx.beginPath(); ctx.roundRect(0,-4,22,8,4); ctx.fill();
    ctx.fillStyle='#ffcc44';
    ctx.beginPath(); ctx.roundRect(2,-3,18,3,2); ctx.fill();
    ctx.restore();
    // Arm 2: 120 degrees from arm 1
    ctx.save(); ctx.rotate(-Math.PI*2/3);
    ctx.fillStyle='#aa6600';
    ctx.beginPath(); ctx.roundRect(0,-4,22,8,4); ctx.fill();
    ctx.fillStyle='#ffcc44';
    ctx.beginPath(); ctx.roundRect(2,-3,18,3,2); ctx.fill();
    ctx.restore();
    // Center hub
    ctx.fillStyle='#ff8800';
    ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffdd88';
    ctx.beginPath(); ctx.arc(-1,-1,2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  } else if (p.type==='rainbow') {
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor=`hsl(${p.hue},100%,65%)`; ctx.shadowBlur=18;
    const rg=ctx.createRadialGradient(0,0,1,0,0,p.r);
    rg.addColorStop(0,'#ffffff');
    rg.addColorStop(0.35,`hsl(${p.hue},100%,72%)`);
    rg.addColorStop(1,`hsl(${(p.hue+60)%360},100%,50%)`);
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=5;
    ['#ff88ff','#88ffff','#ffff88'].forEach((c,si)=>{
      const sa=(frame*.25+si*2.09)%(Math.PI*2);
      ctx.fillStyle=c; ctx.beginPath(); ctx.arc(Math.cos(sa)*(p.r+5),Math.sin(sa)*(p.r+5),2.5,0,Math.PI*2); ctx.fill();
    });
    ctx.shadowBlur=0; ctx.restore();
  } else {
    // bubble
    ctx.save(); ctx.translate(p.x,p.y);
    ctx.shadowColor='#aaddff'; ctx.shadowBlur=9;
    ctx.strokeStyle='rgba(160,210,255,.78)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(180,225,255,.13)'; ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(200,235,255,.32)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,p.r*.68,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.72)';
    ctx.beginPath(); ctx.ellipse(-p.r*.28,-p.r*.3,p.r*.22,p.r*.13,-0.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.38)';
    ctx.beginPath(); ctx.ellipse(p.r*.2,p.r*.2,p.r*.08,p.r*.05,0.4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }
  ctx.restore();
}

// ── Draw Particles ────────────────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
    if (p.star) drawStar5(p.x, p.y, p.r, p.r*.45);
    else { ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); }
    ctx.restore();
  });
}

// ── Draw Rainbow Beams (power-up state) ──────────────────────────
function drawRainbowBeams() {
  if (!chargeActive) return;
  const fade=Math.min(1,chargeTimer/30);
  const rc=['#ff2222','#ff8800','#ffee00','#22ee22','#22aaff','#4488ff','#aa22ff','#ff22cc'];
  ctx.save(); ctx.globalAlpha=fade*.88;
  for (let i=0;i<8;i++) {
    const a=i*Math.PI/4+frame*.008;
    const beamLen=beamLengthToEdge(player.x,player.y,a);
    const ex=player.x+Math.cos(a)*beamLen, ey=player.y+Math.sin(a)*beamLen;
    ctx.shadowColor=rc[i]; ctx.shadowBlur=20;
    ctx.strokeStyle=rc[i]; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.7)'; ctx.lineWidth=2.5; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
  }
  // central glow
  ctx.shadowColor='#fff'; ctx.shadowBlur=30;
  ctx.fillStyle=`rgba(255,255,255,${fade*.5})`;
  ctx.beginPath(); ctx.arc(player.x,player.y,18,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── Draw Rainbow Zones ────────────────────────────────────────────
function drawRainbowZones() {
  const rc=['#ff4444','#ff9900','#ffee00','#44ee44','#4499ff','#aa44ff','#ff44cc'];
  rainbowZones.forEach(z=>{
    ctx.save(); ctx.globalAlpha=.82;
    // concentric rainbow rings pulsing outward
    for (let i=0;i<rc.length;i++) {
      const ri=z.r*(1-(i/rc.length)*.55);
      ctx.strokeStyle=rc[i]; ctx.lineWidth=4+i*.5;
      ctx.shadowColor=rc[i]; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(z.x,z.y,ri*(1+.06*Math.sin(frame*.18+i)),0,Math.PI*2); ctx.stroke();
    }
    // fill
    ctx.shadowBlur=0;
    const rg=ctx.createRadialGradient(z.x,z.y,4,z.x,z.y,z.r);
    rg.addColorStop(0,'rgba(255,255,255,.18)');
    rg.addColorStop(1,'rgba(200,100,255,.07)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(z.x,z.y,z.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Draw Power-ups ────────────────────────────────────────────────
function drawPowerups() {
  powerups.forEach(pu=>{
    ctx.save(); ctx.translate(pu.x, pu.y);
    const pulse=.82+.18*Math.sin(frame*.14+pu.phase);
    if (pu.type==='grenade') {
      // Rainbow gem / grenade collectible
      const hues=['#ff4','#8f8','#4af','#f4f','#fa4'];
      ctx.shadowColor='#ff88ff'; ctx.shadowBlur=22;
      // gem body (diamond)
      ctx.save(); ctx.rotate(frame*.03+pu.phase);
      ctx.fillStyle='rgba(255,100,255,.18)';
      ctx.beginPath();
      ctx.moveTo(0,-pu.r*pulse*1.1); ctx.lineTo(pu.r*pulse*.75,0);
      ctx.lineTo(0,pu.r*pulse*.9); ctx.lineTo(-pu.r*pulse*.75,0); ctx.closePath(); ctx.fill();
      hues.forEach((c,i)=>{
        const a=(i/hues.length)*Math.PI*2+frame*.06;
        ctx.fillStyle=c; ctx.globalAlpha=.7;
        ctx.beginPath(); ctx.arc(Math.cos(a)*pu.r*.45*pulse,Math.sin(a)*pu.r*.45*pulse,3.5,0,Math.PI*2); ctx.fill();
      });
      ctx.restore();
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font=`bold ${Math.round(15*pulse)}px Arial`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🌈',0,1);
    } else {
      // Nuke star orb (existing)
      const hue=(frame*3+pu.phase*50)%360;
      ctx.shadowColor=`hsl(${hue},100%,68%)`; ctx.shadowBlur=28;
      const rg=ctx.createRadialGradient(0,0,2,0,0,pu.r*pulse);
      rg.addColorStop(0,'#ffffff'); rg.addColorStop(.35,`hsl(${hue},100%,78%)`);
      rg.addColorStop(1,`hsl(${(hue+90)%360},100%,44%)`);
      ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(0,0,pu.r*pulse,0,Math.PI*2); ctx.fill();
      ctx.save(); ctx.rotate(frame*.05); ctx.shadowColor='#fff'; ctx.shadowBlur=6;
      ctx.fillStyle='rgba(255,255,255,.88)'; drawStar5(0,0,pu.r*.75*pulse,pu.r*.32*pulse); ctx.restore();
      ctx.shadowBlur=0; ctx.fillStyle='#ff2200';
      ctx.font=`bold ${Math.round(13*pulse)}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('!',0,1);
    }
    ctx.restore();
  });
}

// ── HUD ───────────────────────────────────────────────────────────
function drawHUD() {
  ctx.font='bold 26px "Comic Sans MS",cursive'; ctx.textAlign='left';
  ctx.fillStyle='#fff'; ctx.fillText(`⭐ ${score}`, 14, 36);
  ctx.font='15px "Comic Sans MS",cursive'; ctx.textAlign='center';
  ctx.fillStyle='#ffdd44'; ctx.fillText(`Best: ${hiScore}`, W/2, 24);
  for (let i=0;i<5;i++) {
    ctx.font='27px serif'; ctx.textAlign='right';
    ctx.fillText(i<lives?'❤️':'🖤', W-12-(4-i)*34, 38);
  }
  ctx.font='15px "Comic Sans MS",cursive'; ctx.textAlign='left';
  const weaponColors = {baseball:'#ffe44d', laser:'#00ffcc', lava:'#ff6622', sword:'#aaddff', boomerang:'#ffaa22', rainbow:'#ff88ff', bubble:'#88eeff', icecream:'#ffb3c6', flower:'#ff66cc'};
  const weaponLabels = {baseball:'⚾ Baseball [1]', laser:'🔴 Laser [2]', lava:'🌋 Lava [3]', sword:'⚡ Sword [4]', boomerang:'🪃 Boomerang [5]', rainbow:'🌈 Rainbow [1]', bubble:'🫧 Bubbles [2]', icecream:'🍦 Ice Cream [3]', flower:'🌸 Flowers [4]'};
  ctx.fillStyle=weaponColors[weapon]||'#fff';
  const switchHint = selectedChar==='girl' ? '(1-4/Tab)' : '(1-5/Tab)';
  ctx.fillText((weaponLabels[weapon]||weapon) + '   ' + switchHint, 14, H-12);
  if (grenadeCount>0) {
    ctx.fillStyle='#ff88ff'; ctx.font='bold 15px "Comic Sans MS",cursive';
    ctx.textAlign='right';
    const gl=.7+.3*Math.sin(frame*.14);
    ctx.globalAlpha=gl; ctx.fillText(`🌈 x${grenadeCount}  [G]`, W-14, H-12); ctx.globalAlpha=1;
  }
  // charge bar
  const barW=220, barH=9, barX=W/2-barW/2, barY=H-30;
  ctx.fillStyle='#1a1a2e'; ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,4); ctx.fill();
  const pct=chargeActive?1:Math.min(chargeKills/chargeMax,1);
  if (pct>0) {
    const rg=ctx.createLinearGradient(barX,0,barX+barW,0);
    ['#ff2222','#ff8800','#ffee00','#22ee22','#22aaff','#aa22ff'].forEach((c,i,a)=>rg.addColorStop(i/(a.length-1),c));
    ctx.fillStyle=rg; ctx.beginPath(); ctx.roundRect(barX,barY,barW*pct,barH,4); ctx.fill();
  }
  ctx.strokeStyle='#334'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,4); ctx.stroke();
  if (chargeActive) {
    ctx.globalAlpha=.6+.4*Math.sin(frame*.2); ctx.fillStyle='#ff44ff';
    ctx.shadowColor='#ff44ff'; ctx.shadowBlur=10;
    ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.fillText('⚡ POWERED UP! ⚡', W/2, barY-2);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }
  // pause hint
  ctx.fillStyle='rgba(150,150,180,.55)'; ctx.font='12px Arial'; ctx.textAlign='right';
  ctx.fillText('P: pause', W-14, H-30);
}

// Stateless player draw helpers

function drawUnicornGirlAt(x, y, inv, hf) {

// ── Draw Unicorn Girl ─────────────────────────────────────────────
function drawUnicornGirl() {
  const {x,y,invincible,hitFlash}=player;
  if (invincible>0 && Math.floor(frame/5)%2===0) return;
  ctx.save(); ctx.translate(x,y);

  ctx.fillStyle='rgba(0,0,0,.13)';
  ctx.beginPath(); ctx.ellipse(0,38,50,10,0,0,Math.PI*2); ctx.fill();

  const lb=Math.sin(frame*.12);
  const rc=['#ff5555','#ff9944','#ffdd33','#55cc55','#4499ff','#aa44ff'];

  // === UNICORN ===
  // Back legs
  ctx.strokeStyle='#e8eeff'; ctx.lineWidth=10; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-20,10); ctx.lineTo(-24+lb*8,34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-30,10); ctx.lineTo(-28-lb*6,34); ctx.stroke();
  // Front legs
  ctx.beginPath(); ctx.moveTo(20,10); ctx.lineTo(24-lb*8,34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30,10); ctx.lineTo(28+lb*6,34); ctx.stroke();
  // Hooves
  [[24-lb*8,34],[28+lb*6,34],[-24+lb*8,34],[-28-lb*6,34]].forEach(([hx,hy])=>{
    ctx.fillStyle='#b8c4dd'; ctx.beginPath(); ctx.ellipse(hx,hy,7,4,0,0,Math.PI*2); ctx.fill();
  });

  // Tail
  ctx.save(); ctx.translate(-46,2);
  rc.forEach((c,i)=>{
    ctx.strokeStyle=c; ctx.lineWidth=3.5; ctx.globalAlpha=.88;
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.quadraticCurveTo(-12+i*1.5,8+Math.sin(frame*.09+i)*.6,-18+i*2,20+i*4);
    ctx.stroke();
  });
  ctx.restore(); ctx.globalAlpha=1;

  // Body

  // === GIRL ===

  }
  // Pink bow at braid tip

  ctx.beginPath(); ctx.ellipse(btx-7,bty,8,5,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(btx+7,bty,8,5,0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff2299'; ctx.beginPath(); ctx.arc(btx,bty,3.5,0,Math.PI*2); ctx.fill();

  // === PINK DRESS with flowers ===

  ctx.fillStyle='#ffaad4';

  ctx.beginPath(); ctx.roundRect(-10,-38,14,10,5); ctx.fill();

  // Flowers on dress (inline helper)
  function petal(fx,fy,r){ for(let p=0;p<5;p++){ const a=(p/5)*Math.PI*2; ctx.beginPath(); ctx.ellipse(fx+Math.cos(a)*r*1.1,fy+Math.sin(a)*r*1.1,r*.8,r*.5,a,0,Math.PI*2); ctx.fill(); } }
  ctx.fillStyle='#fff'; petal(-10,-24,4); petal(7,-27,4); petal(-3,-13,4); petal(10,-19,3.5); petal(-7,-33,3); petal(5,-35,3);
  ctx.fillStyle='#ffee44';
  [[-10,-24],[7,-27],[-3,-13],[10,-19],[-7,-33],[5,-35]].forEach(([fx,fy])=>{
    ctx.beginPath(); ctx.arc(fx,fy,2,0,Math.PI*2); ctx.fill();
  });

  // Arms
  ctx.strokeStyle='#f8c090'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(10,-30); ctx.quadraticCurveTo(20,-23,30,-17); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(4,-30); ctx.quadraticCurveTo(14,-21,24,-15); ctx.stroke();

  // === HEAD (big & round, kawaii) ===
  ctx.fillStyle='#ffd0a8';
  ctx.beginPath(); ctx.arc(1,-52,20,0,Math.PI*2); ctx.fill();

  // Hair back (pastel purple)

  ctx.beginPath(); ctx.arc(1,-52,22,Math.PI*.18,Math.PI*.82); ctx.fill();
  // Crown
  ctx.fillStyle='#cc66ff';
  ctx.beginPath(); ctx.ellipse(1,-66,15,9,0,0,Math.PI*2); ctx.fill();
  // Bangs
  ctx.fillStyle='#cc66ff';
  [[-8,-55,8.5],[1,-57,7.5],[11,-55,6.5]].forEach(([bx,by,br])=>{
    ctx.beginPath(); ctx.arc(bx,by,br,Math.PI*1.35,0,false); ctx.fill();

  // Hair shimmer
  ctx.fillStyle='rgba(240,180,255,.5)';
  ctx.beginPath(); ctx.ellipse(-3,-69,7,3,0.2,0,Math.PI*2); ctx.fill();

  // Hair bow (cute pink bow on top-left)
  ctx.fillStyle='#ff66aa';
  ctx.beginPath(); ctx.ellipse(-12,-67,9,6,-0.35,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2,-68,9,6,0.35,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff1188'; ctx.beginPath(); ctx.arc(-7,-68,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,180,220,.6)'; ctx.beginPath(); ctx.arc(-10,-69,2,0,Math.PI*2); ctx.fill();

  // Big rosy cheeks
  ctx.fillStyle='rgba(255,120,160,.38)';
  ctx.beginPath(); ctx.ellipse(-9,-50,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(11,-50,9,6,0,0,Math.PI*2); ctx.fill();

  // === BIG KAWAII EYES ===
  // Eye whites (large ovals)
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-7,-54,9,10,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-54,9,10,0,0,Math.PI*2); ctx.fill();
  // Top eyelid
  ctx.strokeStyle='#220011'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-7,-54,9,Math.PI+.3,-0.3); ctx.stroke();
  ctx.beginPath(); ctx.arc(10,-54,9,Math.PI+.3,-0.3); ctx.stroke();
  // Iris (bright violet)
  ctx.fillStyle='#9933ff';
  ctx.beginPath(); ctx.ellipse(-7,-54,6.5,7.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-54,6.5,7.5,0,0,Math.PI*2); ctx.fill();
  // Pupil
  ctx.fillStyle='#110022';
  ctx.beginPath(); ctx.ellipse(-7,-54,3.5,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-54,3.5,4.5,0,0,Math.PI*2); ctx.fill();
  // Big shine spots
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-9.5,-56.5,2.8,2.2,-0.4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(7.5,-56.5,2.8,2.2,-0.4,0,Math.PI*2); ctx.fill();
  // Small secondary shine
  ctx.beginPath(); ctx.arc(-4.5,-52,1.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12.5,-52,1.2,0,Math.PI*2); ctx.fill();
  // Star sparkle on eyes
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath(); ctx.arc(-5.5,-57.5,1,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(11.5,-57.5,1,0,Math.PI*2); ctx.fill();
  // Cute top lashes (3 per eye, curving upward)
  ctx.strokeStyle='#220011'; ctx.lineWidth=1.8; ctx.lineCap='round';
  [[-14,-61],[-7,-63],[-1,-61]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ex+5,-55); ctx.quadraticCurveTo(ex+3,-58,ex,ey); ctx.stroke();
  });
  [[4,-61],[10,-63],[17,-61]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(ex+2,-55); ctx.quadraticCurveTo(ex+1,-58,ex,ey); ctx.stroke();
  });

  // Tiny dot nose
  ctx.fillStyle='rgba(210,110,100,.55)';
  ctx.beginPath(); ctx.ellipse(1,-45,3.5,2,0,0,Math.PI*2); ctx.fill();

  // Big happy smile (filled arc)
  ctx.fillStyle='#cc2244';
  ctx.beginPath(); ctx.arc(1,-42,8,0.15,Math.PI-0.15); ctx.fill();
  // Inner mouth (lighter pink)
  ctx.fillStyle='#ff6688';
  ctx.beginPath(); ctx.arc(1,-42,5,0.3,Math.PI-0.3); ctx.fill();
  // Tooth line
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(-5,-42); ctx.lineTo(7,-42); ctx.stroke();

  // Hit flash
  if (hitFlash>0) {
    ctx.fillStyle=`rgba(255,40,40,${hitFlash/22*.5})`;
    ctx.beginPath(); ctx.arc(1,-52,32,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Update ────────────────────────────────────────────────────────
function update() {
  frame++;

  STARS.forEach(s => { s.x-=s.speed; if (s.x<-4) { s.x=W+4; s.y=Math.random()*H; } });

  if (gstate!=='playing' || paused) return;

  // charge power-up timer
  if (chargeActive) { if (--chargeTimer<=0) { chargeActive=false; chargeKills=0; } }

  // rainbow beams kill enemies when powered up
  if (chargeActive) {
    enemies=enemies.filter(e=>{
      for (let i=0;i<8;i++) {
        const a=i*Math.PI/4+frame*.008;
        const beamLen=beamLengthToEdge(player.x,player.y,a);
        if (distToBeam(e.x,e.y,player.x,player.y,a,beamLen)<28) {
          const cols=e.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
          burst(e.x,e.y,cols[0],cols[1],e.type==='bigbad'?22:12);
          burst(e.x,e.y,cols[2],cols[3],6);
          const pts=e.type==='bigbad'?30:10;
          score+=pts; if(score>hiScore) hiScore=score;
          spawnFloat(e.x,e.y-45,`+${pts}`,'#ff44ff',45);
          beep('boom'); addChargeKill(); return false;
        }
      }
      return true;
    });
  }

  // difficulty ramp
  if (++diffTimer>700) { diff=Math.min(5,diff+.35); diffTimer=0; }

  // shoot
  if (shootCD>0) shootCD--;
  if (keys['Space']||touchPos!==null) shoot();

  // move
  if (keys['ArrowUp']   ||keys['KeyW']) player.y-=player.speed;
  if (keys['ArrowDown'] ||keys['KeyS']) player.y+=player.speed;
  if (keys['ArrowLeft'] ||keys['KeyA']) player.x-=player.speed*.8;
  if (keys['ArrowRight']||keys['KeyD']) player.x+=player.speed*.8;
  // touch: chase touch position (both axes)
  if (touchPos!==null) {
    const dx=touchPos.x-player.x, dy=touchPos.y-player.y;
    if (Math.abs(dy)>3) player.y+=Math.sign(dy)*Math.min(Math.abs(dy)*.1, player.speed);
    if (Math.abs(dx)>3) player.x+=Math.sign(dx)*Math.min(Math.abs(dx)*.1, player.speed*.8);
  }
  player.x=Math.max(18, Math.min(W*.58, player.x));
  player.y=Math.max(28, Math.min(H-60,  player.y));
  if (player.invincible>0) player.invincible--;
  if (player.hitFlash>0)   player.hitFlash--;

  // sword swing animation
  if (swordSwinging>0) {
    swordSwinging--;
    const t=1-swordSwinging/22;
    swordAngle=-1.5+t*2.2;
  } else {
    swordAngle+=((-0.8)-swordAngle)*.12;
  }

  // spawn enemies
  const interval=Math.max(38,100-diff*10);
  if (++spawnTimer>=interval) { spawnEnemy(); spawnTimer=0; }

  // update enemies
  enemies.forEach(e => {
    e.x+=e.vx;
    if (e.type==='dancer') e.y+=Math.sin(frame*.05+e.phase)*e.amp;
    e.y=Math.max(45,Math.min(H-55,e.y));
    if (e.hitFlash>0) e.hitFlash--;
  });

  // update projectiles
  projectiles.forEach(p => {
    p.x+=p.vx; p.y+=p.vy;
    if (p.type==='baseball') { p.spin+=.18; p.y-=p.vy; } // baseball has no vertical drift
    if (p.type==='lava') { p.vy+=.22; p.vx*=.985; p.life--; }
    if (p.type==='bubble') { p.y+=Math.sin(frame*.08+p.wobble)*.8; }
    if (p.type==='boomerang') {
      p.angle+=.22;
      if (!p.returning && p.x > player.x+280) { p.returning=true; p.vx=-9; p.hitSet=[]; }
    }
    if (p.type==='icecream') { p.vy+=.09; p.spin+=.1; }
    if (p.type==='flower') { p.spin+=.28; }
  });

  // projectile vs enemy
  const newProj=[];
  projectiles=projectiles.filter(p=>{
    if (p.x>W+60 || p.x<-80 || p.y>H+40 || p.y<-40) return false;
    if (p.type==='lava' && p.life<=0) return false;
    // bubble wall bounce (parent only, once)
    if (p.type==='bubble' && !p.isChild) {
      let nx=p.vx, ny=p.vy, bounced=false;
      if (p.x>W-28 && p.vx>0)  { nx=-Math.abs(nx); bounced=true; }
      if (p.y<28   && p.vy<0)  { ny= Math.abs(ny); bounced=true; }
      if (p.y>H-28 && p.vy>0) { ny=-Math.abs(ny); bounced=true; }
      if (bounced) { newProj.push(...makeSplitBubbles(p,nx,ny)); return false; }
    }
    if (p.type==='boomerang') {
      if (p.returning && p.x < player.x-20) return false;
      enemies=enemies.filter(e=>{
        if (p.hitSet.includes(e)) return true;
        const hr=e.type==='bigbad'?44:30;
        if (Math.abs(p.x-e.x)<hr && Math.abs(p.y-e.y)<hr*1.2) {
          p.hitSet.push(e); e.hp--; e.hitFlash=8;
          if (e.hp<=0) {
            const cols=e.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
            burst(e.x,e.y,cols[0],cols[1],e.type==='bigbad'?26:14);
            burst(e.x,e.y,cols[2],cols[3],7);
            const pts=e.type==='bigbad'?30:10;
            score+=pts; if(score>hiScore) hiScore=score;
            spawnFloat(e.x,e.y-45,`+${pts}`,'#ffe44d',45);
            beep('boom'); addChargeKill(); return false;
          }
        }
        return true;
      });
      return true;
    }
    let hit=false;
    enemies=enemies.filter(e=>{
      if (hit) return true;
      const hr=e.type==='bigbad'?44:30;
      if (Math.abs(p.x-e.x)<hr && Math.abs(p.y-e.y)<hr*1.2) {
        e.hp--;  e.hitFlash=8;
        if (e.hp<=0) {
          const cols=e.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
          burst(e.x,e.y,cols[0],cols[1],e.type==='bigbad'?26:14);
          burst(e.x,e.y,cols[2],cols[3],7);
          const pts=e.type==='bigbad'?30:10;
          score+=pts; if (score>hiScore) hiScore=score;
          spawnFloat(e.x,e.y-45,`+${pts}`,'#ffe44d',45);
          beep('boom'); addChargeKill(); hit=true; return false;
        }
        hit=true; return true;
      }
      return true;
    });
    if (hit && p.type==='bubble' && !p.isChild) { newProj.push(...makeSplitBubbles(p,p.vx,p.vy)); return false; }
    return !hit;
  });
  projectiles.push(...newProj);

  // enemy vs player
  if (player.invincible===0) {
    enemies=enemies.filter(e=>{
      if (Math.abs(e.x-player.x)<36 && Math.abs(e.y-player.y)<42) {
        lives--; player.invincible=130; player.hitFlash=22;
        burst(player.x,player.y,'#f44','#fa0',9);
        beep('ouch');
        if (lives<=0) { gstate='gameover'; burst(player.x,player.y,'#f44','#f80',30); saveScore(score); }
        return false;
      }
      return true;
    });
  }

  enemies=enemies.filter(e=>e.x>-130);

  // power-ups: spawn, move, collect
  if (++powerupTimer > 1700) { powerupTimer=0; powerups.push({type:'nuke', x:W+40, y:90+Math.random()*(H-180), phase:Math.random()*Math.PI*2, r:22}); }
  if (++grenadePickupTimer > 1400) { grenadePickupTimer=0; powerups.push({type:'grenade', x:W+40, y:90+Math.random()*(H-180), phase:Math.random()*Math.PI*2, r:20}); }
  powerups.forEach(pu => { pu.x-=1.6; pu.phase+=.04; pu.y+=Math.sin(pu.phase)*.7; });
  powerups=powerups.filter(pu=>{
    if (pu.x < -60) return false;
    if (Math.abs(pu.x-player.x)<40 && Math.abs(pu.y-player.y)<40) {
      if (pu.type==='grenade') {
        grenadeCount++;
        beep('start');
        spawnFloat(player.x,player.y-55,`🌈 Grenade x${grenadeCount}! [G]`,'#ff88ff',65);
        return false;
      }
      // nuke
      enemies.forEach(e=>{
        const cols=e.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
        burst(e.x,e.y,cols[0],cols[1],e.type==='bigbad'?28:16);
        burst(e.x,e.y,cols[2],cols[3],8);
        const pts=e.type==='bigbad'?30:10;
        score+=pts; if(score>hiScore) hiScore=score;
        spawnFloat(e.x,e.y-45,`+${pts}`,'#ffe44d',45);
      });
      burst(player.x,player.y,'#ffe44d','#fff',20);
      spawnFloat(player.x,player.y-70,'💥 WOLVES GONE!','#ffe44d',80);
      if (enemies.length>0) beep('nuke');
      enemies=[];
      return false;
    }
    return true;
  });

  // rainbow zones: damage enemies that enter, then expire
  rainbowZones.forEach(z=>z.x+=z.vx);
  enemies=enemies.filter(e=>{
    if (rainbowZones.some(z=>Math.hypot(e.x-z.x,e.y-z.y)<z.r)) {
      const cols=e.type==='bigbad'?['#ff4','#f84','#fff','#f44']:['#fe4','#f8a','#8af','#fff'];
      burst(e.x,e.y,cols[0],cols[1],e.type==='bigbad'?22:12);
      burst(e.x,e.y,cols[2],cols[3],6);
      const pts=e.type==='bigbad'?30:10;
      score+=pts; if(score>hiScore) hiScore=score;
      spawnFloat(e.x,e.y-45,`+${pts}`,'#ff88ff',45);
      beep('boom'); addChargeKill(); return false;
    }
    return true;
  });
  rainbowZones=rainbowZones.filter(z=>z.x-z.r<W+20);

  // particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.05; p.vx*=.96; p.vy*=.96; p.life--; p.r*=.98; });
  particles=particles.filter(p=>p.life>0&&p.r>.3);

  // floats
  floats.forEach(f=>{ f.y-=.8; f.life--; });
  floats=floats.filter(f=>f.life>0);

  // lightnings
  lightnings.forEach(l=>l.life--);
  lightnings=lightnings.filter(l=>l.life>0);
}

// ── Mobile Buttons ────────────────────────────────────────────────
function drawMobileButtons() {
  if (!touchControls) return;
  ctx.save(); ctx.globalAlpha=0.78;
  // Weapon cycle button
  if (gstate==='playing') {
    ctx.fillStyle='rgba(55,35,115,.72)'; ctx.strokeStyle='rgba(160,120,255,.7)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(WPN_BTN.x,WPN_BTN.y,WPN_BTN.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    const wIco={baseball:'⚾',laser:'🔴',lava:'🌋',sword:'⚡',boomerang:'🪃',rainbow:'🌈',bubble:'🫧',icecream:'🍦',flower:'🌸'};
    ctx.font='22px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
    ctx.fillText(wIco[weapon]||'?', WPN_BTN.x, WPN_BTN.y-8);
    ctx.font='bold 11px Arial'; ctx.fillStyle='#ccf'; ctx.fillText('NEXT',WPN_BTN.x,WPN_BTN.y+14);
    // Grenade button (when holding grenades)
    if (grenadeCount>0) {
      const gl=.7+.3*Math.sin(frame*.15);
      ctx.globalAlpha=0.78*gl;
      ctx.fillStyle='rgba(120,40,120,.72)'; ctx.strokeStyle='rgba(255,100,255,.8)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(GREN_BTN.x,GREN_BTN.y,GREN_BTN.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.globalAlpha=0.78; ctx.font='20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#fff';
      ctx.fillText('🌈', GREN_BTN.x, GREN_BTN.y-7);
      ctx.font='bold 11px Arial'; ctx.fillStyle='#faf'; ctx.fillText(`x${grenadeCount}`,GREN_BTN.x,GREN_BTN.y+12);
    }
    // Pause button
    ctx.globalAlpha=0.55;
    ctx.fillStyle='rgba(20,20,50,.7)'; ctx.strokeStyle='rgba(120,140,200,.6)'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.arc(PAUSE_BTN.x,PAUSE_BTN.y,PAUSE_BTN.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.font='16px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#aaddff';
    ctx.fillText('⏸', PAUSE_BTN.x, PAUSE_BTN.y);
  }
  // High scores button (charselect and gameover)
  if (gstate==='charselect'||gstate==='gameover') {
    ctx.globalAlpha=0.75;
    ctx.fillStyle='rgba(30,20,60,.8)'; ctx.strokeStyle='rgba(255,220,40,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(HISCORE_BTN.x,HISCORE_BTN.y,HISCORE_BTN.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.font='18px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#ffe44d';
    ctx.fillText('🏆', HISCORE_BTN.x, HISCORE_BTN.y);
  }
  ctx.textBaseline='alphabetic'; ctx.restore();
}

// ── Main Loop ─────────────────────────────────────────────────────
function loop() {
  if (gstate==='charselect') { update(); drawCharSelect(); drawMobileButtons(); }
  else if (gstate==='gameover') { update(); drawGameOver(); drawMobileButtons(); }
  else if (gstate==='hiscores') { update(); drawHiscores(); }
  else {
    update();
    drawBG();
    drawParticles();
    drawRainbowZones();
    drawRainbowBeams();
    enemies.forEach(drawWolf);
    drawLightnings();
    projectiles.forEach(drawProjectile);
    drawPowerups();
    drawPlayer();
    drawFloats();
    drawHUD();
    drawMobileButtons();
    if (paused) drawPauseOverlay();
  }
  requestAnimationFrame(loop);
}

loop();
</script>
